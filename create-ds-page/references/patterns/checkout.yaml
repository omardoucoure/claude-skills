    nodeId: "85:47788"
  cart_promo_code:
    reference: "[Checkout] 5 — Shopping Bag (4) + product list + Promo Code card + dark summary footer + Checkout CTA"
    nodeId: "85:47766"

  # ─── PAYMENT ────────────────────────────────────────────────────────────────
  payment_card_form:
