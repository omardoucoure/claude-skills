    reference: "[Checkout] 1 — Dark card cart summary ($839) + product list (image+name+price+icons) + coral shipping + checkout CTA"
    nodeId: "85:47949"
  cart_with_promo:
    reference: "[Checkout] 2 — Cart with promo code input + total breakdown"
    nodeId: "85:47877"
  cart_editable:
