    reference: "[Walkthrough] 14 — Image card + dark CTA card (headline + Get Started coral button) + Already have account"
    nodeId: "85:55899"

  cta_bar_typography_hero:
    reference: "[Walkthrough] 15 — Dark CTA bar (Are you ready? + Get started) + neutral card big text + page dots"
    nodeId: "85:55886"

  social_auth_full_buttons:
    reference: "[Walkthrough] 16 — Image card + 3 coral social buttons (full width) + Or + Create Account + Log In"
    nodeId: "85:55873"

  social_auth_top:
    reference: "[Walkthrough] 17 — 3 coral social buttons top + Or + Login/SignUp outlined + image card below"
