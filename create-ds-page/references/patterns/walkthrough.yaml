pattern: walkthrough
description: Onboarding, walkthrough, welcome, and intro screens — the first experience a user has with the app
source: HaHo Design System — 18 walkthrough variants deeply analyzed (node trees + screenshots)
figma_references:
  # Each layout maps to a specific HaHo designer reference screen.
  # Screenshot the ONE reference that matches your chosen layout — not all of them.

  typography_hero_neutral:
    reference: "[Walkthrough] 1 — Big text on neutral card + subtitle + nav arrows + dark CTA bar"
    nodeId: "85:56093"

  typography_hero_dark:
    reference: "[Walkthrough] 18 — Big white text on dark card + subtitle + nav arrows + coral CTA bar"
    nodeId: "85:55847"

  image_layered_coral_text:
    reference: "[Walkthrough] 2 — Layered image cards (3 depth layers) + coral text card + page dots"
    nodeId: "85:56079"

  carousel_horizontal_peek:
    reference: "[Walkthrough] 3 — Horizontal scrollable cards with peek + page dots + dark text card"
    nodeId: "85:56062"

  accordion_steps:
    reference: "[Walkthrough] 4 — Numbered overlapping step cards (coral→dark→dark) + image below"
    nodeId: "85:56044"

  layered_image_nav_arrows:
    reference: "[Walkthrough] 5 — Layered Card image (3 depth layers) + nav arrows pill + coral text card"
    nodeId: "85:56031"

  gallery_carousel_peek:
    reference: "[Walkthrough] 6 — 3-column image gallery (main + 2 peeking) + page dots + neutral text card"
    nodeId: "85:56017"

  cta_top_image_bottom:
    reference: "[Walkthrough] 7 — Coral CTA bar at top (text+skip) + dark Login/Skip bar + image card below + page dots"
    nodeId: "85:56003"

  typography_hero_with_skip:
    reference: "[Walkthrough] 8 — Coral skip bar at top + neutral card with nav arrows + big text + subtitle"
    nodeId: "85:55990"

  dark_carousel_coral_sides:
    reference: "[Walkthrough] 9 — Dark image card center + coral side cards peeking + nav arrows + neutral text card"
    nodeId: "85:55977"

  image_carousel_coral_cta:
    reference: "[Walkthrough] 10 — Horizontal image cards with peek + coral CTA card (text+icon+Login/Skip)"
    nodeId: "85:55962"

  typography_hero_dark_cta:
    reference: "[Walkthrough] 11 — Neutral card with big text + subtitle + page dots + dark CTA bar (Login+Skip)"
    nodeId: "85:55948"

  text_card_top_layered_image:
